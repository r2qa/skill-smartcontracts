# TRON/TVM-native Semgrep rules — audit INVENTORY hotspots, NOT findings.
# Solidity support in Semgrep is experimental and these are pattern-based (no reliable
# dataflow), so treat every match as a POINTER: the auditor must trace
#   entrypoint -> access control -> user data -> checks -> sink -> financial impact
# before it is a finding. Mirrors the `tvm-native` category in ../../vulnerable-functions.md.
# Severity maps to Semgrep's scale: INFO = LOW/inventory hotspot, WARNING = higher-signal
# (something concrete to confirm). Nothing here is ERROR — a match is never proof.
# Run:  semgrep --config tooling/semgrep-tron/ <src>
rules:
  - id: tron-trc10-msgtoken-context
    languages: [solidity]
    severity: INFO
    message: >
      TRC-10 context (msg.tokenvalue / msg.tokenid) is used. VERIFY msg.tokenid is
      checked against the expected token id BEFORE trusting msg.tokenvalue — otherwise
      an attacker deposits a worthless self-issued TRC-10 and withdraws a real asset
      (BTTBank-class drain).
    metadata:
      category: security
      tron: true
      confidence: LOW
      subcategory: [audit]
      references:
        - https://developers.tron.network/docs/trc10-transfer-in-smart-contracts
    pattern-either:
      - pattern: msg.tokenvalue
      - pattern: msg.tokenid

  - id: tron-transfertoken-call
    languages: [solidity]
    severity: INFO
    message: >
      transferToken(...) moves a TRC-10 token. VERIFY the tokenId argument is trusted /
      allowlisted (not user-controlled) and matches the intended asset.
    metadata:
      category: security
      tron: true
      confidence: LOW
      subcategory: [audit]
      references:
        - https://developers.tron.network/docs/trc10-transfer-in-smart-contracts
    pattern-either:
      - pattern: $X.transferToken(...)
      - pattern: transferToken(...)

  - id: tron-tokenbalance-call
    languages: [solidity]
    severity: INFO
    message: >
      tokenBalance(...) reads a TRC-10 balance. VERIFY the tokenId is trusted, not
      attacker-controlled (balance of an attacker-chosen fake token can spoof accounting).
    metadata:
      category: security
      tron: true
      confidence: LOW
      subcategory: [audit]
    pattern-either:
      - pattern: $X.tokenBalance(...)
      - pattern: tokenBalance(...)

  - id: tron-trctoken-param
    languages: [solidity]
    severity: INFO
    message: >
      A trcToken value is in scope. If it comes from calldata/user input, VERIFY it is
      range-checked or allowlisted before use in transfer/accounting.
    metadata:
      category: security
      tron: true
      confidence: LOW
      subcategory: [audit]
    pattern-either:
      - pattern: |
          function $F(..., trcToken $ID, ...) { ... }
      - pattern: trcToken $ID

  - id: tron-native-value-decimals
    languages: [solidity]
    severity: WARNING
    message: >
      msg.value (the NATIVE value channel) combined directly with an 18-decimal literal
      (1e18 / `ether`). On TRON native value is SUN (1 TRX = 1e6, 6 decimals), so 1e18
      scaling on a native-value path misprices by 1e12x. VERIFY the native math uses SUN,
      not wei. NOTE (Semgrep Solidity = no dataflow): this catches only the single-
      expression form; msg.value assigned to a local and scaled elsewhere is NOT caught —
      still grep msg.value/callvalue paths by hand. Plain 18-decimal WAD/TRC-20 math is
      deliberately not flagged.
    metadata:
      category: security
      tron: true
      confidence: MEDIUM
      subcategory: [audit]
      references:
        - https://developers.tron.network/docs/tvm
    pattern-either:
      - pattern: msg.value * 1e18
      - pattern: 1e18 * msg.value
      - pattern: msg.value / 1e18
      - pattern: msg.value * 1 ether
      - pattern: 1 ether * msg.value
      - pattern: msg.value / 1 ether
      - pattern: msg.value * 1000000000000000000
      - pattern: msg.value / 1000000000000000000

  - id: tron-weak-randomness-tvm-constants
    languages: [solidity]
    severity: WARNING
    message: >
      block.difficulty / block.prevrandao / block.gaslimit are CONSTANTS on the TVM (not
      per-block entropy as on Ethereum). Using them for randomness or as a guard is
      trivially predictable. VERIFY this value is not relied on for unpredictability.
    metadata:
      category: security
      tron: true
      confidence: MEDIUM
      subcategory: [audit]
      references:
        - https://developers.tron.network/docs/tvm
    pattern-either:
      - pattern: block.difficulty
      - pattern: block.prevrandao
      - pattern: block.gaslimit

  - id: tron-create2-eth-prefix
    languages: [solidity]
    severity: WARNING
    message: >
      A 0xff byte in what looks like a CREATE2 address preimage. TVM computes the CREATE2
      address with a 0x41 prefix, NOT Ethereum's 0xff. A hand-rolled 0xff preimage will
      predict the WRONG address on TRON. VERIFY any off-chain/precomputed CREATE2 address
      uses the 0x41 scheme.
    metadata:
      category: security
      tron: true
      confidence: MEDIUM
      subcategory: [audit]
      references:
        - https://developers.tron.network/docs/tvm
    pattern-either:
      - pattern: bytes1(0xff)
      - pattern: hex"ff"

  - id: tron-native-send-stipend
    languages: [solidity]
    severity: WARNING
    message: >
      `.send()`/`.transfer()` native value send assumes the EVM 2300-gas stipend. TVM meters
      Energy differently — the stipend assumption and revert-on-failure behavior may differ.
      VERIFY the recipient path and prefer a checked low-level call with reentrancy guards.
    metadata: { category: security, tron: true, confidence: LOW, subcategory: [audit] }
    pattern-either:
      - pattern: $X.send(...)
      - pattern: payable($X).transfer(...)

  - id: tron-tx-origin-auth
    languages: [solidity]
    severity: WARNING
    message: >
      Authorization via tx.origin is phishing-vulnerable and, post-EIP-7702, no longer
      distinguishes an EOA from contract code. Use msg.sender.
    metadata: { category: security, tron: true, confidence: MEDIUM, subcategory: [audit] }
    pattern-either:
      - pattern: tx.origin == $X
      - pattern: $X == tx.origin
      - pattern: require(tx.origin == $X)

  - id: tron-ecrecover-usage
    languages: [solidity]
    severity: INFO
    message: >
      ecrecover in scope. VERIFY the result is checked against address(0) (invalid sig) and
      signature malleability (low-s / v) is handled. NOTE: inside Solidity an address is 20
      bytes, so an in-contract `ecrecover(...) == addr` compare is normal — the 21-byte 0x41
      form matters only at the Base58/SDK/cross-chain SERIALIZATION boundary; use TRON chainid
      0x2b6653dc in the EIP-712 domain.
    metadata: { category: security, tron: true, confidence: LOW, subcategory: [audit] }
    pattern: ecrecover(...)

  - id: tron-selfdestruct-usage
    languages: [solidity]
    severity: INFO
    message: >
      selfdestruct/suicide in scope. TRON adopted EIP-6780 (mainnet 2026-04-10, param #94):
      post-creation self-destruct no longer deletes code/storage, only transfers balance.
      VERIFY the brick/force-feed assumptions against the target chain's #94 state.
    metadata: { category: security, tron: true, confidence: LOW, subcategory: [audit] }
    pattern-either:
      - pattern: selfdestruct(...)
      - pattern: suicide(...)

  - id: tron-delegatecall-usage
    languages: [solidity]
    severity: WARNING
    message: >
      delegatecall in scope. VERIFY the target is immutable/trusted (arbitrary target = total
      compromise) and note TVM drops calltokenvalue/calltokenid — TRC-10 accounting in
      delegated code reads them as zero.
    metadata: { category: security, tron: true, confidence: MEDIUM, subcategory: [audit] }
    pattern: $X.delegatecall(...)

  - id: tron-lowlevel-call-value
    languages: [solidity]
    severity: INFO
    message: >
      Low-level `.call{value:}` in scope. VERIFY the boolean return is checked, reentrancy is
      guarded (CEI), and the Energy/gas forwarded is intentional on TVM.
    metadata: { category: security, tron: true, confidence: LOW, subcategory: [audit] }
    pattern: "$X.call{value: $V}(...)"

  - id: tron-create2-new-salt
    languages: [solidity]
    severity: INFO
    message: >
      CREATE2 deployment (new C{salt:...}). The TRON compiler emits the CORRECT on-chain
      address (0x41 scheme) for this high-level form — the deploy itself is fine. The risk is
      any OFF-CHAIN / cross-contract PRECOMPUTE of this address (JS/SDK/computeAddress or a
      hand-rolled preimage) that uses Ethereum's 0xff formula → predicts the WRONG address.
      VERIFY every off-chain derivation of this salt/address uses the TVM 0x41 scheme.
    metadata: { category: security, tron: true, confidence: LOW, subcategory: [audit] }
    pattern: "new $C{salt: $S}(...)"
